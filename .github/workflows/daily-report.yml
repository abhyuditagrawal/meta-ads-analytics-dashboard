name: Daily Meta Ads Report

on:
  schedule:
    # Target: 12:30 AM IST = 19:00 UTC previous day.
    # We intentionally run AFTER midnight IST so "yesterday" calculation is
    # always correct (e.g. script runs at 12:30 AM on Apr 20 IST → yesterday = Apr 19).
    # GitHub Actions usually delays 15-60 min, so actual run lands ~12:45 AM - 1:45 AM IST.
    # A slight delay past 1 AM is fine; running BEFORE midnight would give wrong date.
    - cron: '0 19 * * *'
  workflow_dispatch:  # Lets you trigger manually from the Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas reportlab requests

      - name: Run daily report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python daily_email_report.py